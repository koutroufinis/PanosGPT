<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover" />
    <title>PanosGPT</title>

    <!-- Favicon -->
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%230F172A'/%3E%3Cstop offset='100%25' stop-color='%232196F3'/%3E%3C/linearGradient%3E%3C/defs%3E%3Cpath fill='url(%23g)' d='M18 10C18 8.9 18.9 8 20 8H36C47 8 56 17 56 28C56 39 47 48 36 48H28V54C28 58 25 60 20 60H18Z'/%3E%3Cpath fill='white' d='M28 18H36C41.5 18 46 22.5 46 28C46 33.5 41.5 38 36 38H30L24 44V22C24 19.8 25.8 18 28 18Z'/%3E%3Ccircle cx='31' cy='28' r='1.7' fill='%230F172A'/%3E%3Ccircle cx='36' cy='28' r='1.7' fill='%230F172A'/%3E%3Ccircle cx='41' cy='28' r='1.7' fill='%230F172A'/%3E%3C/svg%3E">

    <style>
        /* ── RESET & BASE ─────────────────────────────────────────────────── */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            height: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #0d1117;
            color: #ffffff;
        }

        /* ── CONTAINER ────────────────────────────────────────────────────── */
        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: 100dvh; /* Dynamic viewport height for mobile */
            max-width: 100%;
            background: #161b22;
            margin: 0 auto;
            position: relative;
            overflow: hidden;
        }

        /* ── HEADER ───────────────────────────────────────────────────────── */
        .header {
            flex-shrink: 0;
            text-align: center;
            padding: 16px 16px 12px;
            border-bottom: 1px solid #30363d;
            background: #161b22;
            z-index: 10;
        }

        .header h1 {
            font-size: clamp(1.1rem, 4vw, 1.8rem);
            color: #ffffff;
            margin-bottom: 4px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .header p {
            font-size: clamp(0.75rem, 2vw, 1rem);
            color: #8b949e;
            margin-bottom: 8px;
        }

        .header-controls {
            display: flex;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .header button {
            background: #ff6e06;
            color: white;
            border: none;
            padding: 8px 16px;
            cursor: pointer;
            border-radius: 6px;
            font-size: clamp(0.7rem, 1.5vw, 0.9rem);
            font-weight: 600;
            transition: all 0.2s;
            touch-action: manipulation;
            white-space: nowrap;
            min-height: 36px;
        }

        .header button:active {
            transform: scale(0.95);
            background: #e05e00;
        }

        /* ── CHAT AREA ────────────────────────────────────────────────────── */
        .chat {
            flex: 1;
            overflow-y: auto;
            padding: 12px 12px 8px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            -webkit-overflow-scrolling: touch;
            scroll-behavior: smooth;
            min-height: 0; /* Fix for flex overflow */
        }

        /* ── MESSAGES ────────────────────────────────────────────────────── */
        .message {
            max-width: 88%;
            padding: 10px 14px;
            border-radius: 14px;
            word-wrap: break-word;
            line-height: 1.5;
            animation: fadeIn 0.25s ease-out;
            font-size: clamp(0.85rem, 2vw, 1rem);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .user {
            background: #6581a2;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
            color: #ffffff;
        }

        .bot {
            background: #262c36;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            color: #e6edf3;
        }

        /* ── MESSAGE FORMATTING ──────────────────────────────────────────── */
        .bot p {
            margin: 4px 0;
        }

        .bot p:first-child {
            margin-top: 0;
        }
        .bot p:last-child {
            margin-bottom: 0;
        }

        .bot pre {
            background: #0d1117;
            padding: 10px 14px;
            border-radius: 6px;
            overflow-x: auto;
            margin: 6px 0;
            font-family: 'Courier New', Courier, monospace;
            font-size: clamp(0.75rem, 1.5vw, 0.85rem);
            line-height: 1.4;
            border: 1px solid #30363d;
            white-space: pre-wrap;
            word-wrap: break-word;
            color: #e6edf3;
        }

        .bot code {
            font-family: 'Courier New', Courier, monospace;
            background: #0d1117;
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 0.9em;
            color: #58a6ff;
        }

        .bot pre code {
            background: transparent;
            padding: 0;
            color: inherit;
            font-size: inherit;
        }

        .bot h1, .bot h2, .bot h3, .bot h4, .bot h5, .bot h6 {
            margin: 8px 0 4px 0;
            color: #f0f6fc;
            font-weight: 600;
            line-height: 1.3;
        }

        .bot h1 { font-size: clamp(1.2em, 3vw, 1.5em); }
        .bot h2 { font-size: clamp(1.1em, 2.5vw, 1.3em); }
        .bot h3 { font-size: clamp(1em, 2vw, 1.1em); }

        .bot ul, .bot ol {
            margin: 4px 0;
            padding-left: 20px;
        }

        .bot li {
            margin: 2px 0;
        }

        .bot blockquote {
            border-left: 3px solid #58a6ff;
            padding-left: 12px;
            margin: 6px 0;
            color: #8b949e;
        }

        .bot hr {
            border: none;
            border-top: 1px solid #30363d;
            margin: 8px 0;
        }

        .bot a {
            color: #58a6ff;
            text-decoration: none;
            word-break: break-all;
        }

        .bot a:active {
            color: #79c0ff;
        }

        .bot table {
            border-collapse: collapse;
            width: 100%;
            margin: 6px 0;
            font-size: 0.9em;
        }

        .bot th, .bot td {
            border: 1px solid #30363d;
            padding: 4px 8px;
            text-align: left;
        }

        .bot th {
            background: #0d1117;
            font-weight: 600;
        }

        .bot strong {
            color: #f0f6fc;
            font-weight: 700;
        }

        .bot em {
            font-style: italic;
            color: #c9d1d9;
        }

        /* ── LOADING DOTS ────────────────────────────────────────────────── */
        .dots::after {
            content: '';
            animation: dots 1.2s steps(4, end) infinite;
            display: inline-block;
            width: 20px;
            text-align: left;
        }

        @keyframes dots {
            0% { content: ''; }
            25% { content: '.'; }
            50% { content: '..'; }
            75% { content: '...'; }
            100% { content: ''; }
        }

        /* ── TYPING CURSOR ───────────────────────────────────────────────── */
        .typing-cursor::after {
            content: '▊';
            animation: blink 0.8s step-end infinite;
            display: inline-block;
            margin-left: 2px;
            color: #58a6ff;
            font-size: 1em;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* ── INPUT AREA ──────────────────────────────────────────────────── */
        .inputArea {
            flex-shrink: 0;
            display: flex;
            gap: 8px;
            padding: 10px 12px 12px;
            border-top: 1px solid #30363d;
            background: #161b22;
            align-items: center;
            position: relative;
            z-index: 10;
        }

        .inputArea input {
            flex: 1;
            padding: 12px 14px;
            border: 2px solid transparent;
            background: #0d1117;
            color: #ffffff;
            font-size: clamp(15px, 2.5vw, 16px);
            border-radius: 10px;
            outline: none;
            transition: border-color 0.2s;
            min-height: 44px;
            width: 0; /* Fix for flex */
        }

        .inputArea input::placeholder {
            color: #8b949e;
            font-size: clamp(14px, 2vw, 16px);
        }

        .inputArea input:focus {
            border-color: #58a6ff;
            background: #0d1117;
        }

        .inputArea button {
            flex-shrink: 0;
            border: none;
            background: #215a0b;
            color: white;
            font-size: clamp(18px, 3vw, 22px);
            cursor: pointer;
            border-radius: 10px;
            transition: all 0.2s;
            touch-action: manipulation;
            width: clamp(44px, 10vw, 56px);
            min-height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
        }

        .inputArea button:active {
            transform: scale(0.92);
            background: #1a4a09;
        }

        .inputArea .stop-btn {
            background: #dc3545;
            font-size: clamp(13px, 2vw, 16px);
            width: clamp(56px, 12vw, 72px);
            display: none;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .inputArea .stop-btn:active {
            background: #b02a37;
        }

        .inputArea .stop-btn.visible {
            display: flex;
        }

        /* ── STOP INDICATOR ──────────────────────────────────────────────── */
        .stop-indicator {
            font-size: clamp(11px, 1.5vw, 13px);
            color: #8b949e;
            margin-top: 3px;
            align-self: flex-start;
            padding-left: 14px;
        }

        /* ── SCROLLBAR STYLING ───────────────────────────────────────────── */
        .chat::-webkit-scrollbar {
            width: 5px;
        }

        .chat::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat::-webkit-scrollbar-thumb {
            background: #30363d;
            border-radius: 3px;
        }

        .chat::-webkit-scrollbar-thumb:hover {
            background: #484f58;
        }

        .chat {
            scrollbar-width: thin;
            scrollbar-color: #30363d transparent;
        }

        /* ── RESPONSIVE BREAKPOINTS ──────────────────────────────────────── */

        /* Large screens (desktop) */
        @media (min-width: 768px) {
            .container {
                max-width: 900px;
                height: 90vh;
                height: 90dvh;
                border-radius: 12px;
                margin-top: 5vh;
                box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
            }

            .header {
                padding: 20px 24px 16px;
            }

            .chat {
                padding: 16px 20px 12px;
                gap: 12px;
            }

            .message {
                max-width: 75%;
                padding: 12px 18px;
                border-radius: 16px;
            }

            .inputArea {
                padding: 12px 20px 16px;
                gap: 10px;
            }

            .inputArea input {
                padding: 14px 18px;
                min-height: 50px;
                border-radius: 12px;
            }

            .inputArea button {
                min-height: 50px;
                width: 60px;
                border-radius: 12px;
                font-size: 22px;
            }

            .inputArea .stop-btn {
                width: 80px;
                font-size: 16px;
            }

            .header button:hover {
                background: #e05e00;
                transform: translateY(-1px);
            }

            .inputArea button:hover {
                background: #2a7a0f;
                transform: translateY(-1px);
            }

            .inputArea .stop-btn:hover {
                background: #c82333;
            }
        }

        /* Tablets and small laptops */
        @media (max-width: 767px) and (min-width: 481px) {
            .container {
                border-radius: 0;
            }

            .header {
                padding: 14px 16px 10px;
            }

            .header h1 {
                font-size: 1.4rem;
            }

            .message {
                max-width: 85%;
                padding: 10px 16px;
            }

            .inputArea {
                padding: 8px 12px 12px;
            }
        }

        /* Mobile phones (portrait) */
        @media (max-width: 480px) {
            .header {
                padding: 10px 10px 8px;
            }

            .header h1 {
                font-size: 1.1rem;
                margin-bottom: 2px;
            }

            .header p {
                font-size: 0.7rem;
                margin-bottom: 4px;
            }

            .header button {
                font-size: 0.65rem;
                padding: 6px 12px;
                min-height: 30px;
            }

            .chat {
                padding: 8px 8px 4px;
                gap: 8px;
            }

            .message {
                max-width: 92%;
                padding: 8px 12px;
                border-radius: 12px;
                font-size: 0.88rem;
                line-height: 1.4;
            }

            .inputArea {
                padding: 6px 8px 10px;
                gap: 6px;
            }

            .inputArea input {
                padding: 10px 12px;
                min-height: 40px;
                font-size: 15px;
                border-radius: 8px;
            }

            .inputArea input::placeholder {
                font-size: 14px;
            }

            .inputArea button {
                min-height: 40px;
                width: 44px;
                font-size: 18px;
                border-radius: 8px;
            }

            .inputArea .stop-btn {
                width: 52px;
                font-size: 12px;
                min-height: 40px;
            }

            .bot pre {
                padding: 8px 10px;
                font-size: 0.75rem;
            }

            .bot code {
                font-size: 0.8rem;
            }

            .bot ul, .bot ol {
                padding-left: 16px;
            }
        }

        /* Very small phones (< 360px) */
        @media (max-width: 360px) {
            .header h1 {
                font-size: 0.95rem;
            }

            .header p {
                font-size: 0.6rem;
            }

            .header button {
                font-size: 0.6rem;
                padding: 4px 8px;
                min-height: 26px;
            }

            .message {
                font-size: 0.8rem;
                padding: 6px 10px;
                max-width: 95%;
            }

            .inputArea input {
                font-size: 14px;
                padding: 8px 10px;
                min-height: 36px;
            }

            .inputArea input::placeholder {
                font-size: 13px;
            }

            .inputArea button {
                min-height: 36px;
                width: 38px;
                font-size: 16px;
            }

            .inputArea .stop-btn {
                width: 44px;
                font-size: 11px;
                min-height: 36px;
            }

            .bot pre {
                font-size: 0.7rem;
                padding: 6px 8px;
            }

            .bot code {
                font-size: 0.7rem;
            }
        }

        /* Landscape mode on phones */
        @media (max-height: 500px) and (orientation: landscape) {
            .header {
                padding: 6px 12px 4px;
            }

            .header h1 {
                font-size: 1rem;
                margin-bottom: 0;
            }

            .header p {
                display: none;
            }

            .header-controls {
                gap: 4px;
            }

            .header button {
                font-size: 0.6rem;
                padding: 4px 10px;
                min-height: 28px;
            }

            .chat {
                padding: 4px 8px 2px;
                gap: 4px;
            }

            .message {
                padding: 6px 10px;
                font-size: 0.8rem;
                max-width: 80%;
                border-radius: 10px;
            }

            .inputArea {
                padding: 4px 8px 6px;
                gap: 4px;
            }

            .inputArea input {
                padding: 6px 10px;
                min-height: 32px;
                font-size: 14px;
            }

            .inputArea button {
                min-height: 32px;
                width: 36px;
                font-size: 16px;
            }

            .inputArea .stop-btn {
                width: 44px;
                font-size: 11px;
                min-height: 32px;
            }

            .bot pre {
                padding: 4px 8px;
                font-size: 0.65rem;
            }

            .bot code {
                font-size: 0.7rem;
            }
        }

        /* Touch device optimizations */
        @media (hover: none) and (pointer: coarse) {
            .header button:hover,
            .inputArea button:hover {
                transform: none;
            }

            .header button:active,
            .inputArea button:active {
                transform: scale(0.92);
            }

            .inputArea input {
                font-size: 16px; /* Prevents zoom on iOS */
            }
        }

        /* Safe area support for notched phones */
        @supports (padding: max(0px)) {
            .container {
                padding-left: max(0px, env(safe-area-inset-left));
                padding-right: max(0px, env(safe-area-inset-right));
                padding-bottom: max(0px, env(safe-area-inset-bottom));
            }

            .inputArea {
                padding-bottom: max(12px, env(safe-area-inset-bottom));
            }
        }

        /* Prevent zoom on double-tap (iOS) */
        button, input {
            touch-action: manipulation;
        }

        /* Disable text selection on buttons */
        button {
            user-select: none;
            -webkit-user-select: none;
        }

        /* Loading animation for thinking state */
        .thinking {
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
    </style>
</head>

<body>

    <div class="container">

        <div class="header">
            <h1 id="title">PanosGPT v1.0</h1>
            <p id="subtitle"></p>

            <div class="header-controls">
                <button id="langBtn">Change to: Greek</button>
            </div>
        </div>

        <div class="chat" id="chat"></div>

        <div class="inputArea">
            <input id="input" placeholder="Ask something..." autocomplete="off" enterkeyhint="send">
            <button id="send" aria-label="Send message">➤</button>
            <button id="stopBtn" class="stop-btn" aria-label="Stop response">⏹ Stop</button>
        </div>

    </div>

    <script>
        // ── DOM refs ──────────────────────────────────────────────────────────
        const chat = document.getElementById('chat');
        const input = document.getElementById('input');
        const sendBtn = document.getElementById('send');
        const stopBtn = document.getElementById('stopBtn');
        const langBtn = document.getElementById('langBtn');
        const titleEl = document.getElementById('title');
        const subtitleEl = document.getElementById('subtitle');

        // ── State ────────────────────────────────────────────────────────────
        let isGreek = false;
        let isProcessing = false;
        let isTyping = false;
        let shouldStop = false;
        let typingTimeout = null;
        let currentBotDiv = null;
        let currentAnswer = '';

        // ── Markdown to HTML converter ──────────────────────────────────────

        function markdownToHtml(text) {
            let html = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

            // Code blocks
            html = html.replace(/```(\w*)\n([\s\S]*?)```/g, (match, lang, code) => {
                return `<pre><code class="language-${lang}">${code.trim()}</code></pre>`;
            });

            // Inline code
            html = html.replace(/`([^`]+)`/g, '<code>$1</code>');

            // Headers
            html = html.replace(/^### (.*$)/gim, '<h3>$1</h3>');
            html = html.replace(/^## (.*$)/gim, '<h2>$1</h2>');
            html = html.replace(/^# (.*$)/gim, '<h1>$1</h1>');

            // Bold
            html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            html = html.replace(/__(.*?)__/g, '<strong>$1</strong>');

            // Italic
            html = html.replace(/\*(.*?)\*/g, '<em>$1</em>');
            html = html.replace(/_(.*?)_/g, '<em>$1</em>');

            // Blockquotes
            html = html.replace(/^> (.*$)/gim, '<blockquote>$1</blockquote>');

            // Unordered lists
            html = html.replace(/^[\*\-] (.*$)/gim, '<li>$1</li>');
            html = html.replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>');

            // Ordered lists
            html = html.replace(/^\d+\. (.*$)/gim, '<li>$1</li>');
            html = html.replace(/(<li>.*<\/li>)/s, '<ol>$1</ol>');

            // Horizontal rules
            html = html.replace(/^---$/gim, '<hr>');
            html = html.replace(/^\*\*\*$/gim, '<hr>');

            // Links
            html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>');

            // Paragraphs
            html = html.replace(/\n\n/g, '</p><p>');
            html = html.replace(/\n/g, '<br>');

            // Wrap in paragraph if not already wrapped
            if (!html.startsWith('<')) {
                html = '<p>' + html + '</p>';
            }

            return html;
        }

        // ── Typing animation with HTML support ─────────────────────────────

        function typeMessageWithHtml(element, htmlContent, speed = 15) {
            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = htmlContent;
            const textContent = tempDiv.textContent || tempDiv.innerText;
            const fullHtml = htmlContent;

            element.innerHTML = '';
            element.classList.add('typing-cursor');
            isTyping = true;
            shouldStop = false;

            let currentText = '';
            let currentPos = 0;

            return new Promise((resolve) => {
                function typeNext() {
                    if (shouldStop) {
                        element.classList.remove('typing-cursor');
                        element.innerHTML = fullHtml;
                        isTyping = false;
                        resolve();
                        return;
                    }

                    if (currentPos < textContent.length) {
                        currentText += textContent[currentPos];
                        currentPos++;

                        let htmlSoFar = '';
                        let textIndex = 0;
                        let inTag = false;
                        let tagBuffer = '';

                        for (let i = 0; i < fullHtml.length; i++) {
                            const ch = fullHtml[i];
                            if (ch === '<') {
                                inTag = true;
                                tagBuffer = '<';
                            } else if (ch === '>') {
                                inTag = false;
                                tagBuffer += '>';
                                htmlSoFar += tagBuffer;
                                tagBuffer = '';
                            } else if (inTag) {
                                tagBuffer += ch;
                            } else {
                                if (textIndex < currentText.length) {
                                    htmlSoFar += ch;
                                    textIndex++;
                                }
                            }
                        }

                        element.innerHTML = htmlSoFar;
                        chat.scrollTop = chat.scrollHeight;

                        const delay = '.!?,:;'.includes(textContent[currentPos - 1]) ? speed * 2.5 : speed;
                        typingTimeout = setTimeout(typeNext, delay);
                    } else {
                        element.classList.remove('typing-cursor');
                        element.innerHTML = fullHtml;
                        isTyping = false;
                        resolve();
                    }
                }
                typeNext();
            });
        }

        // ── Stop function ──────────────────────────────────────────────────

        function stopResponse() {
            if (!isTyping && !isProcessing) return;

            shouldStop = true;

            if (typingTimeout) {
                clearTimeout(typingTimeout);
                typingTimeout = null;
            }

            if (currentBotDiv && currentAnswer) {
                currentBotDiv.innerHTML = markdownToHtml(currentAnswer);
                currentBotDiv.classList.remove('typing-cursor');
            }

            isTyping = false;
            isProcessing = false;

            stopBtn.classList.remove('visible');
            sendBtn.style.display = 'flex';
            sendBtn.disabled = false;
            input.disabled = false;
            input.focus();

            if (currentBotDiv && currentAnswer) {
                const stopIndicator = document.createElement('div');
                stopIndicator.className = 'stop-indicator';
                stopIndicator.textContent = '⏹ Stopped';
                currentBotDiv.parentNode.insertBefore(stopIndicator, currentBotDiv.nextSibling);
            }
        }

        // ── Helpers ──────────────────────────────────────────────────────────

        function addMessage(text, type) {
            const div = document.createElement('div');
            div.className = 'message ' + type;
            if (type === 'bot') {
                div.innerHTML = markdownToHtml(text);
            } else {
                div.textContent = text;
            }
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
            return div;
        }

        function addLoadingMessage() {
            const div = document.createElement('div');
            div.className = 'message bot';
            div.textContent = 'Thinking';
            div.classList.add('dots');
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
            return div;
        }

        // ── Show/Hide stop button ──────────────────────────────────────────

        function showStopButton() {
            stopBtn.classList.add('visible');
            sendBtn.style.display = 'none';
        }

        function hideStopButton() {
            stopBtn.classList.remove('visible');
            sendBtn.style.display = 'flex';
        }

        // ── Send message ─────────────────────────────────────────────────────

        async function sendMessage() {
            const text = input.value.trim();
            if (!text || isProcessing) return;

            if (isTyping) {
                stopResponse();
                await new Promise(resolve => setTimeout(resolve, 100));
            }

            isProcessing = true;
            input.disabled = true;
            sendBtn.disabled = true;
            showStopButton();

            addMessage(text, 'user');
            input.value = '';

            const loadingEl = addLoadingMessage();

            try {
                const payload = { message: text };

                const resp = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload),
                });

                loadingEl.remove();

                if (!resp.ok) {
                    const errData = await resp.json().catch(() => ({}));
                    addMessage('❌ Error: ' + (errData.error || resp.statusText), 'bot');
                    isProcessing = false;
                    hideStopButton();
                    input.disabled = false;
                    sendBtn.disabled = false;
                    input.focus();
                    return;
                }

                const data = await resp.json();
                currentAnswer = data.response || 'No response.';

                currentBotDiv = document.createElement('div');
                currentBotDiv.className = 'message bot';
                chat.appendChild(currentBotDiv);
                chat.scrollTop = chat.scrollHeight;

                const formattedHtml = markdownToHtml(currentAnswer);
                await typeMessageWithHtml(currentBotDiv, formattedHtml, 12);

            } catch (err) {
                loadingEl.remove();
                addMessage('❌ Network error: ' + err.message, 'bot');
            }

            isProcessing = false;
            hideStopButton();
            input.disabled = false;
            sendBtn.disabled = false;
            input.focus();
            currentBotDiv = null;
            currentAnswer = '';
        }

        // ── Event listeners ──────────────────────────────────────────────────

        sendBtn.addEventListener('click', sendMessage);
        stopBtn.addEventListener('click', stopResponse);

        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !isProcessing) {
                e.preventDefault();
                sendMessage();
            }
        });

        // ── Language toggle ──────────────────────────────────────────────────

        langBtn.addEventListener('click', () => {
            isGreek = !isGreek;
            if (isGreek) {
                titleEl.textContent = 'Καλώς ήρθες στο PanosGPT';
                subtitleEl.textContent = 'Τι έχεις στο μυαλό σου σήμερα;';
                input.placeholder = 'Ρώτησε κάτι...';
                langBtn.textContent = 'Change to: English';
                stopBtn.textContent = '⏹ Σταμάτα';
            } else {
                titleEl.textContent = 'Welcome to PanosGPT v1.0';
                subtitleEl.textContent = "What's on your mind today?";
                input.placeholder = 'Ask something...';
                langBtn.textContent = 'Change to: Greek';
                stopBtn.textContent = '⏹ Stop';
            }
        });

        // ── Focus input on load ─────────────────────────────────────────────

        window.addEventListener('load', () => {
            // Small delay to ensure DOM is ready
            setTimeout(() => {
                input.focus();
            }, 100);

            // Handle iOS keyboard issues
            if (navigator.userAgent.match(/iPhone|iPad|iPod/i)) {
                document.addEventListener('touchstart', () => {
                    if (!isProcessing) {
                        input.focus();
                    }
                }, { once: true });
            }
        });

        // ── Keyboard shortcuts ─────────────────────────────────────────────

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && document.activeElement === input) {
                input.value = '';
                input.blur();
            }
            if (e.key === 'Enter' && e.ctrlKey && !isProcessing) {
                e.preventDefault();
                sendMessage();
            }
            // Cmd+Enter for Mac
            if (e.key === 'Enter' && e.metaKey && !isProcessing) {
                e.preventDefault();
                sendMessage();
            }
        });

        // ── Prevent zoom on double tap (iOS) ──────────────────────────────

        let lastTouchEnd = 0;
        document.addEventListener('touchend', (e) => {
            const now = Date.now();
            if (now - lastTouchEnd <= 300) {
                e.preventDefault();
            }
            lastTouchEnd = now;
        }, { passive: false });

        // ── Auto-resize input on mobile ─────────────────────────────────────

        if ('ontouchstart' in window) {
            input.addEventListener('focus', function() {
                setTimeout(() => {
                    this.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }, 300);
            });
        }

        // ── Prevent scrolling on input focus (iOS) ────────────────────────

        document.addEventListener('touchmove', function(e) {
            const target = e.target;
            if (target && target.closest && target.closest('.chat')) {
                return; // Allow scrolling in chat
            }
            if (target && target.tagName === 'INPUT') {
                // Allow scrolling when input is focused
                return;
            }
        }, { passive: true });
    </script>

</body>
